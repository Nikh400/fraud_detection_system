name: Deploy Backend to Hugging Face

on:
  push:
    branches: [ main ]
    paths:
      - "fraud_detection/**"
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Hugging Face Hub
        run: pip install huggingface_hub

      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          import os, sys
          from huggingface_hub import HfApi

          token = os.environ.get('HF_TOKEN')
          if not token:
              print('ERROR: HF_TOKEN is missing! Did you save it as a Repository Secret?')
              sys.exit(1)

          try:
              api = HfApi()
              print('Uploading fraud_detection folder to Hugging Face Spaces...')
              api.upload_folder(
                  folder_path='fraud_detection',
                  repo_id='nikh400/fraud-detector-api',
                  repo_type='space',
                  token=token
              )
              print('Successfully uploaded!')
          except Exception as e:
              print(f'Upload failed: {e}')
              sys.exit(1)
          "
